name: "🎯 Company Reconciler — Cross-Product"

# Company-level reconciler running from HQ every 2 hours:
# - Catches approved decisions not yet dispatched (across all products)
# - Security audit (across all products)
# - Weekly product review trigger (Mondays)

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours (reduced from 2h)
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        type: choice
        options:
          - "full-cycle"
          - "reconcile"
          - "security-audit"
        default: "full-cycle"

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: company-reconciler
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: "🔄 Cross-Product Reconciler"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;

            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            let totalDispatched = 0;

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              console.log(`\n🔄 Reconciling ${repo}...`);

              try {
                // Find approved decisions not yet dispatched
                const { data: closedDecisions } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'closed',
                  labels: 'needs-owner-approval',
                  sort: 'updated', direction: 'desc', per_page: 20,
                });

                const { data: implIssues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all',
                  labels: 'engineering,agent/dispatcher', per_page: 100,
                });

                // Build dedup sets
                const dispatchedNums = new Set();
                const dispatchedTitles = new Set();
                for (const impl of implIssues) {
                  const ref = (impl.body || '').match(/Decision:\s*#(\d+)/);
                  if (ref) dispatchedNums.add(parseInt(ref[1]));
                  dispatchedTitles.add(impl.title);
                }

                for (const decision of closedDecisions) {
                  const hours = (Date.now() - new Date(decision.closed_at).getTime()) / 3600000;
                  if (hours > 72) continue;

                  const slug = decision.title.replace(/\[(OPPORTUNITY|DECISION)\]\s*/gi, '').trim();
                  const implTitle = `[IMPLEMENT] ${slug}`;

                  if (dispatchedNums.has(decision.number) || dispatchedTitles.has(implTitle)) {
                    continue;
                  }

                  console.log(`  🔧 Un-dispatched: #${decision.number} — ${decision.title}`);
                  try {
                    const rec = ((decision.body || '').match(/## Recommendation\n([\s\S]*?)(?=\n##|\n$)/) || [])[1];
                    await github.rest.repos.createDispatchEvent({
                      owner, repo: hqRepo,
                      event_type: 'implementation-approved',
                      client_payload: {
                        source_repo: `${owner}/${repo}`,
                        issue_number: decision.number,
                        title: decision.title,
                        recommendation: (rec || 'See decision issue').trim().slice(0, 500),
                        hop_count: 0,
                      },
                    });
                    totalDispatched++;
                  } catch (e) {
                    console.log(`  ⚠️ Dispatch failed: ${e.message}`);
                  }
                }

                // Check for stuck unassigned bugs
                const { data: bugs } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'bug', per_page: 20,
                });
                for (const bug of bugs) {
                  if (bug.assignees.length === 0) {
                    const hours = (Date.now() - new Date(bug.created_at).getTime()) / 3600000;
                    if (hours > 2) {
                      console.log(`  🐛 Assigning bug #${bug.number} to copilot`);
                      try {
                        await github.rest.issues.addAssignees({
                          owner, repo, issue_number: bug.number, assignees: ['copilot'],
                        });
                      } catch {}
                    }
                  }
                }
              } catch (e) {
                console.log(`  ⚠️ Reconcile failed for ${repo}: ${e.message}`);
              }
            }
            console.log(`\n🔄 Reconciler: dispatched ${totalDispatched} items across ${products.length} products`);

  security-audit:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.action == 'security-audit' || inputs.action == 'full-cycle'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: "🔒 CISO Agent — Cross-Product Security Audit"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const today = new Date().toISOString().split('T')[0];

            // Skip if already audited today
            const { data: existingSec } = await github.rest.issues.listForRepo({
              owner, repo: hqRepo, state: 'open', labels: 'security', per_page: 10,
            });
            if (existingSec.some(i => i.title.includes(today))) {
              console.log('Security audit already reported today');
              return;
            }

            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');
            const allFindings = [];

            // Keywords that suggest actual credential exposure when followed by an assignment or value.
            // These are checked using context-aware patterns to reduce false positives from
            // routine commit messages like "fix: token refresh logic" or "feat: password hashing".
            const sensitiveKeywords = [
              'password', 'passwd', 'secret', 'api_key', 'apikey',
              'token', 'credential', 'private_key', 'privatekey',
              'auth_key', 'authkey', 'bearer', 'access_key', 'accesskey',
              'client_secret', 'clientsecret',
            ];

            // Commit message patterns that indicate a keyword is used in a safe, descriptive context
            // (e.g. feature work, refactoring, testing, CI/CD config) rather than credential exposure.
            const safeCommitPatterns = [
              /\btoken\s+(refresh|expir|validat|generat|rotat|handl|check|verif|parse|encod|hash|reset|revok)/i,
              /\b(refresh|expir|validat|generat|rotat|handl|check|verif|parse|encod|hash|reset|revok)\s+token/i,
              /\bjwt\b/i,
              /\bpassword\s+(hash|strength|validat|reset|change|policy|encod|salt)/i,
              /\b(hash|salt|bcrypt|argon|pbkdf)\s+password/i,
              /\badd\s+(auth|security|token|credential)\s+(test|spec|middleware|flow|support|endpoint)/i,
              /\b(auth|security|token)\s+test/i,
              /\btest\s+(auth|security|token)/i,
              /\bredact\s+(sensitive|secret|token|password)/i,
              // CI/CD workflow patterns — token references in GitHub Actions YAML are not leaked credentials.
              /\$\{\{[^}]*?\btoken\b/i,                              // ${{ ... token (GitHub Actions expression)
              /\bgithub-token\s*:/i,                                  // github-token: parameter in actions/github-script
              /\bpersist-credentials\b/i,                             // actions/checkout persist-credentials setting
              /\bsecrets\.(GITHUB_TOKEN|AGENT_PAT)\b/i,               // explicit GitHub secret names
              /\bgithub\.token\b/i,                                   // github.token built-in
              /\bcheckout\b[^\n]{0,100}\btoken\b/i,                   // checkout action token parameter (same line)
              /\btoken\b[^\n]{0,100}\bcheckout\b/i,                   // token + checkout action (same line)
              /\bci[\s/\-]?cd\b[^\n]{0,100}\btoken\b/i,              // token mentioned in CI/CD context (same line)
              /\btoken\b[^\n]{0,100}\bci[\s/\-]?cd\b/i,              // CI/CD mentioned after token (same line)
              /\bworkflow\s+(token|failure|fix|error|permission)/i,    // workflow token/failure fix patterns
              /\btoken\s+(permission|scope|workflow|action)/i,         // token permission/scope changes
            ];

            // Patterns that strongly suggest an actual credential value is present in the commit message.
            // These fire a high-severity warning regardless of safe patterns.
            // Upper bounds are set to prevent catastrophic backtracking on very long strings.
            const credentialValuePatterns = [
              /[a-zA-Z_]+\s*=\s*["']?[A-Za-z0-9+/]{20,256}["']?/,  // KEY=longvalue (env-var style)
              /[a-zA-Z_]+:\s*["'][A-Za-z0-9+/]{20,256}["']/,         // key: "longvalue"
              /eyJ[A-Za-z0-9_-]{10,1024}/,                            // JWT-like base64 prefix
              /ghp_[A-Za-z0-9]{36}/,                                  // GitHub PAT (exact 36-char suffix)
              /sk-[A-Za-z0-9]{32,128}/,                               // OpenAI-style key
            ];

            // Test file pattern: changes to *.test.js / *.spec.ts etc. are expected and healthy.
            const testFilePattern = /(__tests__|\.test\.|\.spec\.)/;

            // Rolling window for commit scanning (avoids re-reporting old commits every audit cycle).
            const AUDIT_WINDOW_DAYS = 7;

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                // Only scan commits within the audit window to avoid repeatedly reporting old findings.
                const since = new Date(Date.now() - AUDIT_WINDOW_DAYS * 24 * 3600 * 1000).toISOString();
                const { data: commits } = await github.rest.repos.listCommits({
                  owner, repo, since, per_page: 50,
                });
                const reportedShas = new Set();
                for (const c of commits) {
                  if (reportedShas.has(c.sha)) continue;
                  const msg = c.commit.message || '';
                  const msgLower = msg.toLowerCase();

                  // First check for high-confidence credential value patterns (always warn).
                  const hasCredentialValue = credentialValuePatterns.some(p => p.test(msg));
                  if (hasCredentialValue) {
                    allFindings.push(`⚠️ **${repo}**: Commit ${c.sha.slice(0,7)} message appears to contain a credential value`);
                    reportedShas.add(c.sha);
                    continue;
                  }

                  // Check for sensitive keywords, but skip if the context matches a safe pattern.
                  const matched = sensitiveKeywords.find(kw => msgLower.includes(kw));
                  if (matched) {
                    const isSafe = safeCommitPatterns.some(p => p.test(msg));
                    if (!isSafe) {
                      allFindings.push(`⚠️ **${repo}**: Commit ${c.sha.slice(0,7)} message contains sensitive keyword (\`${matched}\`)`);
                      reportedShas.add(c.sha);
                    } else {
                      allFindings.push(`ℹ️ **${repo}**: Commit ${c.sha.slice(0,7)} references \`${matched}\` (context appears safe — verify if unexpected)`);
                      reportedShas.add(c.sha);
                    }
                  }
                }

                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'all', sort: 'updated', direction: 'desc', per_page: 5,
                });
                for (const pr of prs) {
                  try {
                    const { data: files } = await github.rest.pulls.listFiles({ owner, repo, pull_number: pr.number });
                    const secFiles = files.filter(f =>
                      f.filename.includes('auth') || f.filename.includes('security') || f.filename.includes('.env')
                    );
                    if (secFiles.length === 0) continue;

                    // Separate production source files (⚠️) from test/spec files (ℹ️) in a single pass.
                    const { prodSecFiles, testSecFiles } = secFiles.reduce(
                      (acc, f) => {
                        if (testFilePattern.test(f.filename)) acc.testSecFiles.push(f);
                        else acc.prodSecFiles.push(f);
                        return acc;
                      },
                      { prodSecFiles: [], testSecFiles: [] }
                    );

                    if (prodSecFiles.length > 0) {
                      allFindings.push(`⚠️ **${repo}**: PR #${pr.number} modified security source files: ${prodSecFiles.map(f => f.filename).join(', ')}`);
                    }
                    if (testSecFiles.length > 0) {
                      allFindings.push(`ℹ️ **${repo}**: PR #${pr.number} modified security test files: ${testSecFiles.map(f => f.filename).join(', ')}`);
                    }
                  } catch {}
                }
              } catch (e) {
                allFindings.push(`⚠️ **${repo}**: Scan failed — ${e.message}`);
              }
            }

            if (allFindings.length === 0) {
              console.log('🔒 No security findings across all products');
              return;
            }

            const hasCritical = allFindings.some(f => f.startsWith('⚠️'));

            // Create follow-up issues in affected product repos for critical findings
            const criticalByRepo = {};
            for (const finding of allFindings) {
              if (!finding.startsWith('⚠️')) continue;
              const repoMatch = finding.match(/\*\*([^*]+)\*\*/);
              if (!repoMatch) continue;
              const repo = repoMatch[1];
              if (!criticalByRepo[repo]) criticalByRepo[repo] = [];
              criticalByRepo[repo].push(finding);
            }

            for (const [repo, findings] of Object.entries(criticalByRepo)) {
              try {
                const { data: existingSecIssues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'security', per_page: 10,
                });
                if (!existingSecIssues.some(i => i.title.includes(today))) {
                  await github.rest.issues.create({
                    owner, repo,
                    title: `[SECURITY] Sensitive keyword detected in commit — ${today}`,
                    body: [
                      `## 🔒 CISO Security Alert`,
                      ``,
                      `The CISO agent detected potential sensitive data in recent commit messages.`,
                      ``,
                      `### Findings`,
                      findings.join('\n'),
                      ``,
                      `### Required Actions`,
                      `1. **Investigate** each flagged commit to determine if actual secrets were committed`,
                      `2. **Rotate** any exposed credentials immediately (API keys, tokens, passwords)`,
                      `3. **Purge** secrets from git history using \`git filter-repo\` or BFG Repo-Cleaner if confirmed`,
                      `4. **Update** all services using rotated credentials`,
                      `5. **Document** remediation steps taken`,
                      ``,
                      `> ⚠️ If this is a false positive (e.g., commit message mentions "password hashing" as a feature), close this issue with a comment explaining why.`,
                      ``,
                      `---`,
                      `*Detected by CISO Agent (HQ) — CreativeWare*`,
                    ].join('\n'),
                    labels: ['security', 'agent/ciso'],
                    assignees: ['fratei'],
                  });
                  console.log(`🔒 Created security follow-up in ${repo}`);
                }
              } catch (e) {
                console.log(`⚠️ Could not create follow-up in ${repo}: ${e.message}`);
              }
            }

            await github.rest.issues.create({
              owner, repo: hqRepo,
              title: `[SECURITY] Company Audit — ${today}`,
              body: [
                `## 🔒 CISO Agent — Cross-Product Security Audit`,
                ``, `### Findings`,
                allFindings.join('\n'),
                ``,
                ...(hasCritical ? [
                  `### Required Actions`,
                  `1. **Review** each flagged commit to determine if actual secrets were exposed`,
                  `2. **Rotate** any exposed credentials immediately (API keys, tokens, passwords)`,
                  `3. **Purge** secrets from git history if confirmed using \`git filter-repo\` or BFG Repo-Cleaner`,
                  `4. **Verify** that affected services have been updated with new credentials`,
                  ``,
                  `> Follow-up issues have been created in each affected product repo.`,
                  ``,
                  `@fratei — potential security issues found. Please review and take action.`,
                ] : [
                  `Informational findings only. No immediate action required.`,
                ]),
              ].join('\n'),
              labels: ['security', 'agent/ciso'],
              assignees: hasCritical ? ['fratei'] : [],
            });
