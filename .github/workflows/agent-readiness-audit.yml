name: "🔎 Agent Readiness Audit"

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: agent-readiness-audit-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Audit configured repositories
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repos = [
              'creative-ware-hq',
              'creative-ware-product-template',
              'audiotext-app',
              'synthdata-app',
            ];
            const requiredPaths = [
              'AGENTS.md',
              '.github/copilot-instructions.md',
              '.devcontainer/devcontainer.json',
              '.github/workflows/copilot-setup-steps.yml',
            ];

            const results = [];
            for (const repo of repos) {
              const row = { repo };
              for (const p of requiredPaths) {
                try {
                  await github.rest.repos.getContent({ owner, repo, path: p });
                  row[p] = '✅';
                } catch {
                  row[p] = '❌';
                }
              }
              results.push(row);
            }

            const hasRequiredBootstrap = (row) =>
              (row['AGENTS.md'] === '✅' || row['.github/copilot-instructions.md'] === '✅') &&
              row['.devcontainer/devcontainer.json'] === '✅' &&
              row['.github/workflows/copilot-setup-steps.yml'] === '✅';

            const header = '| Repository | AGENTS.md | copilot-instructions | devcontainer | copilot-setup-steps |';
            const divider = '|---|---|---|---|---|';
            const lines = results.map(r =>
              `| ${owner}/${r.repo} | ${r['AGENTS.md']} | ${r['.github/copilot-instructions.md']} | ${r['.devcontainer/devcontainer.json']} | ${r['.github/workflows/copilot-setup-steps.yml']} |`
            );
            const missing = results.filter(r => !hasRequiredBootstrap(r));

            const body = [
              '## 🔎 Agent Readiness Audit',
              '',
              `Generated: ${new Date().toISOString()}`,
              '',
              header,
              divider,
              ...lines,
              '',
              missing.length === 0
                ? 'All audited repositories meet the minimum autonomous agent bootstrap requirements.'
                : `Missing requirements detected in **${missing.length}** repo(s).`,
              '',
              'Minimum instructions requirement passes when either `AGENTS.md` or `.github/copilot-instructions.md` exists.',
              'Use `.github/workflows/bootstrap-product-repair.yml` to restore missing bootstrap files in product repositories.',
              '',
              'See also: `docs/agents/AUTONOMY-ADMIN-CHECKLIST.md`',
            ].join('\n');

            console.log(body);

            if (missing.length > 0) {
              await github.rest.issues.create({
                owner,
                repo: context.repo.repo,
                title: `[AUDIT] Agent readiness gaps detected — ${new Date().toISOString().slice(0, 10)}`,
                body,
                labels: ['agent/orchestrator', 'needs-owner-approval'],
              });
            }
