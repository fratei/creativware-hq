name: "🤝 Agent Meetings — Company Coordination"

# Outcome-focused standup facilitator + strategy review + escalation
# - Standup: every 8 hours — structured 6-segment agenda
# - Strategy review: weekly on Mondays
# - Escalation: on-demand via dispatcher

on:
  schedule:
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:
    inputs:
      meeting_type:
        description: "Type of meeting"
        type: choice
        options:
          - "standup"
          - "strategy-review"
          - "escalation"
        default: "standup"
      escalation_context:
        description: "Context for escalation"
        type: string
        default: ""
  repository_dispatch:
    types: [meeting-requested]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  standup:
    if: >-
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.meeting_type == 'standup') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.type == 'standup')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: "🗓️ Daily Standup Facilitator"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const shift = now.getUTCHours() < 8 ? 'Night' : now.getUTCHours() < 16 ? 'Morning' : 'Afternoon';
            const eightHoursAgo = new Date(Date.now() - 8 * 3600000).toISOString();
            const OWNER_HANDLE = 'fratei';

            // ── Load registry ──
            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            // ── Load company goal from strategy/README.md ──
            let companyGoal = 'No company goal defined — update strategy/README.md';
            try {
              const strategyContent = fs.readFileSync('strategy/README.md', 'utf-8');
              const dirMatch = strategyContent.match(/Approved Strategic Direction[^]*?Owner-approved priority:\*\*\s*(.+)/);
              if (dirMatch) companyGoal = dirMatch[1].trim();
            } catch {}

            // ── Load opportunity briefs ──
            const opportunities = [];
            const oppDir = 'strategy/opportunities';
            try {
              const oppFiles = fs.readdirSync(oppDir).filter(f => f.endsWith('.md') && f !== 'TEMPLATE.md');
              for (const file of oppFiles) {
                const content = fs.readFileSync(path.join(oppDir, file), 'utf-8');
                const statusMatch = content.match(/\*\*Status:\*\*\s*(.+)/);
                const nameMatch = content.match(/^#\s+(.+)/m);
                opportunities.push({
                  name: nameMatch ? nameMatch[1] : file.replace('.md', ''),
                  status: statusMatch ? statusMatch[1].trim() : 'unknown',
                  file,
                });
              }
            } catch {}

            // ══════════════════════════════════════════════
            // SEGMENT 1: Quick Alignment
            // ══════════════════════════════════════════════
            const seg1 = [
              `## 1️⃣ Quick Alignment`,
              ``,
              `**Company Goal:** ${companyGoal}`,
              ``,
              `> Is today's focus still correct? Any major change from yesterday?`,
            ];

            // ══════════════════════════════════════════════
            // SEGMENT 2: Market & Opportunity Intelligence
            // ══════════════════════════════════════════════
            const marketSignals = [];
            const oppUpdates = [];

            // ── Read latest web research brief for real signals ──
            let webResearchSummary = '';
            try {
              const researchDir = 'strategy/research';
              const researchFiles = fs.readdirSync(researchDir)
                .filter(f => f.match(/^\d{4}-\d{2}-\d{2}\.md$/))
                .sort()
                .reverse();
              if (researchFiles.length > 0) {
                const briefContent = fs.readFileSync(path.join(researchDir, researchFiles[0]), 'utf-8');
                const briefDate = researchFiles[0].replace('.md', '');
                const takeaways = briefContent.match(/## 🎯 Actionable Takeaways\n([\s\S]*?)(?=\n---)/);
                const newsSection = briefContent.match(/### Industry News\n([\s\S]*?)(?=\n###)/);
                const userPains = briefContent.match(/### User Pain Points.*?\n([\s\S]*?)(?=\n###|\n## )/);
                const competitorSection = briefContent.match(/## 🎯 Competitor Activity\n([\s\S]*?)(?=\n---|\n## )/);

                webResearchSummary = [
                  `### 🔬 Latest Web Research (${briefDate})`,
                  '',
                  takeaways ? takeaways[1].trim().split('\n').slice(0, 5).join('\n') : '_No takeaways._',
                  '',
                  newsSection ? '**Top news:**\n' + newsSection[1].trim().split('\n').slice(0, 3).join('\n') : '',
                  '',
                  userPains ? '**User pain points:**\n' + userPains[1].trim().split('\n').slice(0, 3).join('\n') : '',
                  '',
                  competitorSection ? '**Competitor moves:**\n' + competitorSection[1].trim().split('\n').filter(l => l.startsWith('- ')).slice(0, 3).join('\n') : '',
                ].filter(Boolean).join('\n');
              }
            } catch (e) {
              console.log(`📖 No web research briefs: ${e.message}`);
            }

            // Scan all product repos + HQ for market signals
            const allRepos = [...products.map(p => p.repo.replace(/^[^/]+\//, '')), hqRepo];
            for (const repo of allRepos) {
              try {
                const { data: signals } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all', labels: 'market-signal',
                  since: eightHoursAgo, per_page: 10,
                });
                for (const s of signals) {
                  marketSignals.push(`- 📡 [${s.title}](${s.html_url}) (${repo})`);
                }

                const { data: opps } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all', labels: 'opportunity',
                  since: eightHoursAgo, per_page: 10,
                });
                for (const o of opps) {
                  oppUpdates.push(`- 💡 [${o.title}](${o.html_url}) (${repo})`);
                }
              } catch {}
            }

            // Add opportunity briefs from files
            for (const opp of opportunities) {
              oppUpdates.push(`- 📋 **${opp.name}** — Status: *${opp.status}* (strategy/opportunities/${opp.file})`);
            }

            const seg2 = [
              `## 2️⃣ Market & Opportunity Intelligence`,
              ``,
              webResearchSummary ? webResearchSummary : '',
              ``,
              `### New Market Signals (last 8h)`,
              marketSignals.length ? marketSignals.join('\n') : '- _No new market signals. Agents should actively research trends, competitors, and emerging verticals._',
              ``,
              `### Opportunity Pipeline`,
              oppUpdates.length ? oppUpdates.join('\n') : '- _No tracked opportunities. Create briefs in `strategy/opportunities/` using the template._',
              ``,
              `> ⚡ **Facilitator note:** If signals are vague, agents must clarify: Which ICP? What evidence? What value?`,
            ].filter(Boolean);

            // ══════════════════════════════════════════════
            // SEGMENT 3: Product Health, Gaps & Customer Feedback
            // ══════════════════════════════════════════════
            const productSections = [];
            let totalOpenPRs = 0, totalMerged = 0, totalBugs = 0, totalIncidents = 0;
            const allGaps = [];
            const allFeedback = [];

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: openPRs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 30 });
                const { data: closedPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 15,
                });
                const merged = closedPRs.filter(pr => pr.merged_at && new Date(pr.merged_at) > new Date(eightHoursAgo));
                const { data: bugs } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'bug', per_page: 50 });
                const { data: incidents } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'incident', per_page: 10 });

                totalOpenPRs += openPRs.length;
                totalMerged += merged.length;
                totalBugs += bugs.length;
                totalIncidents += incidents.length;

                // Feature gaps
                for (const label of ['feature-gap', 'enhancement', 'missing-feature']) {
                  try {
                    const { data: gaps } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label, per_page: 10 });
                    for (const g of gaps) {
                      allGaps.push(`- [${g.title}](${g.html_url}) \`${label}\``);
                    }
                  } catch {}
                }

                // Customer feedback
                try {
                  const { data: fb } = await github.rest.issues.listForRepo({ owner, repo, state: 'all', labels: 'customer-feedback', since: eightHoursAgo, per_page: 10 });
                  for (const f of fb) {
                    allFeedback.push(`- [${f.title}](${f.html_url}) (${repo})`);
                  }
                } catch {}

                // Recent commits for outcomes
                let recentCommits = [];
                try {
                  const { data: commits } = await github.rest.repos.listCommits({ owner, repo, since: eightHoursAgo, per_page: 5 });
                  recentCommits = commits.map(c => `  - \`${c.sha.slice(0,7)}\` ${c.commit.message.split('\n')[0]}`);
                } catch {}

                productSections.push([
                  `#### 📦 ${product.name} (\`${repo}\`)`,
                  `| Metric | Value |`,
                  `|--------|-------|`,
                  `| Open PRs | ${openPRs.length} |`,
                  `| Merged (8h) | ${merged.length} |`,
                  `| Open Bugs | ${bugs.length} |`,
                  `| Incidents | ${incidents.length} |`,
                  recentCommits.length ? `\n**Recent outcomes:**\n${recentCommits.join('\n')}` : '',
                ].filter(Boolean).join('\n'));

              } catch (e) {
                productSections.push(`#### 📦 ${product.name} — ⚠️ scan failed: ${e.message}`);
              }
            }

            const seg3 = [
              `## 3️⃣ Product Health, Gaps & Customer Feedback`,
              ``,
              `### Health Dashboard`,
              `| Metric | Total |`,
              `|--------|-------|`,
              `| Products | ${products.length} |`,
              `| Open PRs | ${totalOpenPRs} |`,
              `| Merged (8h) | ${totalMerged} |`,
              `| Open Bugs | ${totalBugs} |`,
              `| Incidents | ${totalIncidents} |`,
              ``,
              ...productSections,
              ``,
              `### Feature Gaps`,
              allGaps.length ? allGaps.join('\n') : '- _No labeled feature gaps. Use labels: `feature-gap`, `enhancement`, `missing-feature`._',
              ``,
              `### Customer Feedback (last 8h)`,
              allFeedback.length ? allFeedback.join('\n') : '- _No new customer feedback. Agents should log feedback with label `customer-feedback`._',
            ];

            // ══════════════════════════════════════════════
            // SEGMENT 4: Execution Updates
            // ══════════════════════════════════════════════
            const execUpdates = [];
            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: closedIssues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'closed', since: eightHoursAgo, per_page: 10,
                });
                const actualIssues = closedIssues.filter(i => !i.pull_request);
                if (actualIssues.length) {
                  execUpdates.push(`**${product.name}** — ${actualIssues.length} issues resolved:`);
                  for (const i of actualIssues.slice(0, 5)) {
                    execUpdates.push(`- ✅ [${i.title}](${i.html_url})`);
                  }
                }
              } catch {}
            }

            const seg4 = [
              `## 4️⃣ Execution Updates (last 8h)`,
              ``,
              execUpdates.length ? execUpdates.join('\n') : '- _No issues closed in the last 8 hours._',
              ``,
              `> **Facilitator:** Agents should speak in *outcomes*, not tasks. "What changed because of your work?"`,
            ];

            // ══════════════════════════════════════════════
            // SEGMENT 5: Decisions & Escalations
            // ══════════════════════════════════════════════
            const pendingDecisions = [];
            const blockers = [];

            for (const repo of allRepos) {
              try {
                const { data: pending } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'needs-owner-approval', per_page: 20,
                });
                for (const p of pending) {
                  pendingDecisions.push(`- 🔴 [${p.title}](${p.html_url}) — @${OWNER_HANDLE} decision needed`);
                }
              } catch {}

              try {
                const { data: blocked } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'blocker', per_page: 10,
                });
                for (const b of blocked) {
                  blockers.push(`- 🚫 [${b.title}](${b.html_url}) (${repo})`);
                }
              } catch {}
            }

            const seg5 = [
              `## 5️⃣ Decisions & Escalations`,
              ``,
              `### Pending Owner Decisions (@${OWNER_HANDLE})`,
              pendingDecisions.length ? pendingDecisions.join('\n') : '- _No pending decisions._',
              ``,
              `### Blockers`,
              blockers.length ? blockers.join('\n') : '- _No active blockers._',
            ];

            // ══════════════════════════════════════════════
            // SEGMENT 6: Standup Summary
            // ══════════════════════════════════════════════

            // Determine if the standup produced insight
            const hasInsight = marketSignals.length > 0 || oppUpdates.length > 0 || allFeedback.length > 0;
            const insightNote = hasInsight
              ? ''
              : `\n> ⚠️ **No new market or customer insight this standup.** Agents should research one of: competitor moves, customer feedback themes, or emerging verticals before next standup.`;

            const seg6 = [
              `## 6️⃣ Summary & Next Steps`,
              ``,
              `| Key Fact | Value |`,
              `|----------|-------|`,
              `| Market signals | ${marketSignals.length} |`,
              `| Opportunities tracked | ${opportunities.length + oppUpdates.length} |`,
              `| Feedback items | ${allFeedback.length} |`,
              `| Bugs open | ${totalBugs} |`,
              `| Decisions pending | ${pendingDecisions.length} |`,
              `| Blockers | ${blockers.length} |`,
              insightNote,
              ``,
              `---`,
              `*Next standup in ~8 hours. @${OWNER_HANDLE} — review pending decisions above.*`,
              `*Generated by CreativeWare Standup Facilitator Agent.*`,
            ];

            // ── Assemble full report ──
            // Include a hidden shift marker so deduplication works consistently for both
            // the daily file and issue comments, regardless of format changes.
            const shiftMarker = `<!-- standup-shift:${shift} -->`;
            const report = [
              shiftMarker,
              `# 🗓️ Daily Standup — ${shift} Shift (${today})`,
              ``,
              `**Participants:** Orchestrator, CEO, CPO, CTO, Engineering, DevOps, QA, Marketing, Sales, CS, CFO, CISO, HR, Legal`,
              `**Facilitator:** Standup Facilitator Agent`,
              ``,
              ...seg1, '', ...seg2, '', ...seg3, '', ...seg4, '', ...seg5, '', ...seg6,
            ].join('\n');

            // ── Write daily-standups/YYYY-MM-DD.md via API ──
            // Append this shift's report to the daily file rather than overwriting,
            // so all three shifts (Night / Morning / Afternoon) are preserved.
            const standupPath = `daily-standups/${today}.md`;
            let existingSha = null;
            let existingContent = '';
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner, repo: hqRepo, path: standupPath,
              });
              existingSha = existing.sha;
              existingContent = Buffer.from(existing.content, 'base64').toString('utf-8');
            } catch {}

            // Guard: skip writing if this shift was already recorded in the file
            if (!existingContent.includes(shiftMarker)) {
              const newContent = existingContent
                ? existingContent.trimEnd() + '\n\n---\n\n' + report
                : report;

              const fileParams = {
                owner, repo: hqRepo, path: standupPath,
                message: `📋 Standup summary ${today} ${shift}`,
                content: Buffer.from(newContent).toString('base64'),
                committer: { name: 'Standup Facilitator', email: 'standup@creativware.dev' },
              };
              if (existingSha) fileParams.sha = existingSha;
              await github.rest.repos.createOrUpdateFileContents(fileParams);
            } else {
              console.log(`⏭️ ${shift} shift already recorded in ${standupPath} — skipping file write`);
            }

            // ── Create or update standup issue ──
            const standupTitle = `[STANDUP] ${today}`;
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner, repo: hqRepo, state: 'open', labels: 'standup', per_page: 5,
            });
            const todayStandup = existingIssues.find(i => i.title === standupTitle);

            if (todayStandup) {
              // Guard: check if this shift was already commented to prevent duplicates
              // from concurrent workflow runs — use the same shift marker embedded in the report
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo: hqRepo, issue_number: todayStandup.number, per_page: 30,
              });
              const shiftAlreadyPosted = comments.some(c => c.body.includes(shiftMarker));
              if (!shiftAlreadyPosted) {
                await github.rest.issues.createComment({
                  owner, repo: hqRepo, issue_number: todayStandup.number, body: report,
                });
              } else {
                console.log(`⏭️ ${shift} shift already commented on issue — skipping duplicate`);
              }
            } else {
              for (const old of existingIssues) {
                if (old.title !== standupTitle) {
                  await github.rest.issues.update({ owner, repo: hqRepo, issue_number: old.number, state: 'closed' });
                }
              }
              await github.rest.issues.create({
                owner, repo: hqRepo, title: standupTitle, body: report,
                labels: ['standup', 'agent/orchestrator'],
              });
            }

  strategy-review:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.meeting_type == 'strategy-review') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.type == 'strategy-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "📊 Weekly Strategy Review"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
            const today = new Date().toISOString().split('T')[0];

            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            const rows = [];
            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: closed } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'closed', since: weekAgo, per_page: 50,
                });
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 30,
                });
                const merged = prs.filter(pr => pr.merged_at && pr.merged_at >= weekAgo).length;
                rows.push(`| ${product.name} | ${closed.length} | ${merged} |`);
              } catch {
                rows.push(`| ${product.name} | ? | ? |`);
              }
            }

            const report = [
              `## 📋 Weekly Strategy Review — ${today}`,
              ``,
              `### Product Performance (Last 7 Days)`,
              `| Product | Issues Closed | PRs Merged |`,
              `|---------|---------------|------------|`,
              ...rows,
              ``,
              `---`,
              `*Generated by CreativeWare HQ*`,
            ].join('\n');

            await github.rest.issues.create({
              owner, repo: hqRepo,
              title: `[REPORT] Weekly Strategy Review — ${today}`,
              body: report,
              labels: ['agent/orchestrator', 'report'],
            });

  escalation:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.meeting_type == 'escalation') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.type == 'escalation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🚨 Escalation Meeting"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ctx = context.payload.client_payload?.context ||
                         '${{ inputs.escalation_context }}' || 'No context provided';

            await github.rest.issues.create({
              owner, repo,
              title: `[ESCALATION] ${new Date().toISOString().split('T')[0]} — Cross-functional review needed`,
              body: [
                `## 🚨 Escalation Meeting`,
                `**Context:** ${ctx}`,
                ``,
                `@fratei — This item requires your decision.`,
              ].join('\n'),
              labels: ['escalation', 'needs-owner-approval'],
              assignees: ['fratei'],
            });
