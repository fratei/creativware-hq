name: "🧠 Agent Dispatcher — Central Event Router"

# Central dispatcher for CreativeWare's autonomous agent system.
# Lives in HQ — routes events across ALL product repos.
# Product repos forward events here via repository_dispatch.

on:
  repository_dispatch:
    types:
      - implementation-approved
      - incident-detected
      - meeting-requested
      - market-analysis-requested
      - work-completed

  workflow_dispatch:
    inputs:
      action:
        description: "Manual dispatch action"
        type: choice
        options:
          - "reconcile"
          - "status-report"
        default: "reconcile"

permissions:
  contents: read
  issues: write

concurrency:
  group: agent-dispatcher-${{ github.event.client_payload.source_repo || github.run_id }}
  cancel-in-progress: false

jobs:
  route-event:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - id: implementation-template
        uses: ./.github/actions/render-prompt
        with:
          template_name: dispatcher-implementation-task
          vars_json: '{"decision_ref":"decision_ref","approved_by":"approved_by","recommendation":"recommendation"}'

      - name: "🧠 Dispatcher — Route Event"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const ws = process.env.GITHUB_WORKSPACE;
            const cfg = require(`${ws}/.github/scripts/agent-config.js`);
            const { assignCopilotWithRetry } = require(`${ws}/.github/scripts/assign-copilot.js`);
            const { recordOutcome } = require(`${ws}/.github/scripts/record-outcome.js`);

            const owner = context.repo.owner;
            const event = context.payload.action;
            const payload = context.payload.client_payload || {};

            console.log(`📨 HQ Dispatcher received: ${event}`);
            console.log(`   Payload: ${JSON.stringify(payload).slice(0, 500)}`);

            // Validate source repo is in registry
            const registry = JSON.parse(fs.readFileSync(path.join(ws, 'products', 'registry.json'), 'utf-8'));
            const validRepos = new Set(registry.products.map(p => p.repo));
            const sourceRepo = payload.source_repo || '';
            const decisionRepo = payload.decision_repo || sourceRepo;
            const targetRepo = sourceRepo.replace(/^[^/]+\//, '') || '';
            const decisionTargetRepo = decisionRepo.replace(/^[^/]+\//, '') || '';

            if (sourceRepo && !validRepos.has(sourceRepo)) {
              console.log(`🛑 Rejected: source repo '${sourceRepo}' not in registry`);
              return;
            }

            // Loop prevention: reject forwarded events
            if (payload.forwarded_from_hq) {
              console.log('🛑 Loop prevention: event already processed by HQ');
              return;
            }

            // Circuit breaker: hop count
            const maxHops = cfg.getMaxHopCount();
            const hopCount = (payload.hop_count || 0) + 1;
            if (hopCount > maxHops) {
              console.log(`🛑 CIRCUIT BREAKER: hop count exceeded ${maxHops}`);
              return;
            }

            // Circuit breaker: max issues per day
            const maxIssues = cfg.getMaxDispatcherIssuesPerDay();
            const today = new Date().toISOString().split('T')[0];
            if (targetRepo) {
              const { data: todayIssues } = await github.rest.issues.listForRepo({
                owner, repo: targetRepo, state: 'all', since: `${today}T00:00:00Z`,
                labels: 'agent/dispatcher', per_page: 100,
              });
              if (todayIssues.length > maxIssues) {
                console.log(`🛑 CIRCUIT BREAKER: >${maxIssues} dispatcher issues today in ${targetRepo}`);
                return;
              }
            }

            // Structured handoff format
            const formatHandoff = (from, to, action, priority, ctx, deadline = 'next cycle') => [
              `## Agent Handoff: ${from} → ${to}`,
              `**Action Required:** ${action}`,
              `**Priority:** ${priority}`,
              `**Context:** ${ctx}`,
              `**Deadline:** ${deadline}`,
              ``,
            ].join('\n');

            switch (event) {
              case 'implementation-approved': {
                if (!targetRepo) {
                  console.log('⚠️ No source_repo in payload — cannot route');
                  break;
                }
                const issueNumber = payload.issue_number;
                const title = payload.title || 'Approved implementation';
                const approvedBy = payload.approved_by || 'owner';
                const decisionRef = issueNumber && decisionRepo
                  ? `${decisionRepo}#${issueNumber}`
                  : `${targetRepo}#${issueNumber}`;
                const implTitle = `[IMPLEMENT] ${title.replace(/\[(DECISION|OPPORTUNITY)\]\s*/gi, '').trim()}`;

                // Dedup: check for existing open IMPLEMENT issue
                const { data: existingImpls } = await github.rest.issues.listForRepo({
                  owner, repo: targetRepo, state: 'open',
                  labels: 'engineering,agent/dispatcher', per_page: 100,
                });
                if (existingImpls.some(i => i.title === implTitle)) {
                  console.log(`⏭️ Skipping — already exists: ${implTitle}`);
                  break;
                }

                const templateBody = `${{ steps.implementation-template.outputs.rendered }}`;

                const implBody = [
                  templateBody,
                  ``,
                  `**Dispatched by:** 🧠 HQ Dispatcher`,
                  `**Hop:** ${hopCount}`,
                  ``,
                  `### Instructions`,
                  `1. Read the full decision in ${decisionRef}`,
                  `2. Review strategy docs in \`strategy/\``,
                  `3. Follow the Agent Handbook (\`docs/agents/HANDBOOK.md\`)`,
                  `4. Implement the approved changes`,
                  `5. Create a PR linked to this issue`,
                  ``,
                  `### Acceptance Criteria`,
                  `- [ ] Implementation matches the approved decision`,
                  `- [ ] All existing tests pass`,
                  `- [ ] New functionality has tests`,
                  `- [ ] Documentation updated`,
                  `- [ ] PR description explains changes`,
                ].join('\n');

                const { data: impl } = await github.rest.issues.create({
                  owner, repo: targetRepo,
                  title: implTitle,
                  body: implBody,
                  labels: ['engineering', 'agent/dispatcher', 'copilot'],
                });

                // Assign to Copilot coding agent using reliable helper
                const assigned = await assignCopilotWithRetry({
                  github, owner, repo: targetRepo, issue_number: impl.number,
                });

                console.log(`✅ Created ${targetRepo}#${impl.number}${assigned ? ' → @copilot' : ' (assignment-failed)'}`);

                // Record in outcomes
                await recordOutcome({
                  kind: 'implementation-dispatched',
                  summary: implTitle.slice(0, 80),
                  decisionRef,
                  prRef: `${targetRepo}#${impl.number}`,
                  result: assigned ? '✅ dispatched' : '⚠️ assignment-failed',
                  notes: `approved-by=${approvedBy}`,
                });

                // Comment on decision issue
                if (issueNumber && decisionTargetRepo) {
                  const handoff = formatHandoff(
                    '🧠 HQ Dispatcher', '💻 Engineering (@copilot)',
                    'implement', 'high',
                    `Implementation dispatched as #${impl.number}`,
                    '48h'
                  );
                  await github.rest.issues.createComment({
                    owner, repo: decisionTargetRepo,
                    issue_number: issueNumber,
                    body: handoff,
                  });
                }
                break;
              }

              case 'incident-detected': {
                if (!targetRepo) break;
                const pattern = payload.pattern || 'Unknown error';
                const severity = payload.severity || 'medium';

                const maxIncidents = cfg.getMaxIncidentsPerHour();
                const oneHourAgo = new Date(Date.now() - 3600000).toISOString();
                const { data: recent } = await github.rest.issues.listForRepo({
                  owner, repo: targetRepo, state: 'all', labels: 'incident',
                  since: oneHourAgo, per_page: 10,
                });
                if (recent.length >= maxIncidents) {
                  console.log(`🛑 CIRCUIT BREAKER: ≥${maxIncidents} incidents in last hour`);
                  break;
                }

                const { data: incident } = await github.rest.issues.create({
                  owner, repo: targetRepo,
                  title: `🚨 [INCIDENT] ${pattern.slice(0, 80)}`,
                  body: [
                    `## Production Incident`,
                    `**Severity:** ${severity}`,
                    `**Pattern:** \`${pattern}\``,
                    `**Detected by:** HQ Dispatcher`,
                    ``,
                    `@copilot please investigate this error.`,
                  ].join('\n'),
                  labels: ['bug', 'incident', 'agent/dispatcher'],
                });

                await assignCopilotWithRetry({
                  github, owner, repo: targetRepo, issue_number: incident.number,
                });
                console.log(`🚨 Incident ${targetRepo}#${incident.number} created`);
                break;
              }

              case 'meeting-requested': {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo: context.repo.repo,
                  workflow_id: 'agent-meetings.yml',
                  ref: 'main',
                  inputs: { meeting_type: payload.type || 'standup' },
                });
                console.log('✅ Meeting workflow triggered');
                break;
              }

              case 'market-analysis-requested': {
                const analysisType = payload.analysis_type || 'all';
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo: context.repo.repo,
                  workflow_id: 'market-analysis.yml',
                  ref: 'main',
                  inputs: { analysis_type: analysisType },
                });
                console.log(`📊 Market analysis workflow triggered (type: ${analysisType})`);
                break;
              }

              case 'work-completed': {
                console.log(`✅ Work completed: ${payload.summary || 'no summary'}`);
                break;
              }

              default:
                console.log(`⚠️ Unknown event type: ${event}`);
            }
