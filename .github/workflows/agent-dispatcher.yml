name: "ЁЯза Agent Dispatcher тАФ Central Event Router"

# Central dispatcher for CreativeWare's autonomous agent system.
# Lives in HQ тАФ routes events across ALL product repos.
# Product repos forward events here via repository_dispatch.

on:
  repository_dispatch:
    types:
      - implementation-approved
      - incident-detected
      - meeting-requested
      - market-analysis-requested
      - work-completed

  workflow_dispatch:
    inputs:
      action:
        description: "Manual dispatch action"
        type: choice
        options:
          - "reconcile"
          - "status-report"
        default: "reconcile"

permissions:
  contents: read
  issues: write

jobs:
  route-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "ЁЯза Dispatcher тАФ Route Event"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const event = context.payload.action;
            const payload = context.payload.client_payload || {};

            console.log(`ЁЯУи HQ Dispatcher received: ${event}`);
            console.log(`   Payload: ${JSON.stringify(payload).slice(0, 500)}`);

            // Validate source repo is in registry
            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const validRepos = new Set(registry.products.map(p => p.repo));
            const sourceRepo = payload.source_repo || '';
            const targetRepo = sourceRepo.replace(/^[^/]+\//, '') || '';

            if (sourceRepo && !validRepos.has(sourceRepo)) {
              console.log(`ЁЯЫС Rejected: source repo '${sourceRepo}' not in registry`);
              return;
            }

            // Loop prevention: reject forwarded events
            if (payload.forwarded_from_hq) {
              console.log('ЁЯЫС Loop prevention: event already processed by HQ');
              return;
            }

            // Circuit breaker: hop count
            const hopCount = (payload.hop_count || 0) + 1;
            if (hopCount > 5) {
              console.log('ЁЯЫС CIRCUIT BREAKER: hop count exceeded 5');
              return;
            }

            // Circuit breaker: max issues per day
            const today = new Date().toISOString().split('T')[0];
            if (targetRepo) {
              const { data: todayIssues } = await github.rest.issues.listForRepo({
                owner, repo: targetRepo, state: 'all', since: `${today}T00:00:00Z`,
                labels: 'agent/dispatcher', per_page: 100,
              });
              if (todayIssues.length > 20) {
                console.log(`ЁЯЫС CIRCUIT BREAKER: >20 dispatcher issues today in ${targetRepo}`);
                return;
              }
            }

            // Structured handoff format
            const formatHandoff = (from, to, action, priority, ctx, deadline = 'next cycle') => [
              `## Agent Handoff: ${from} тЖТ ${to}`,
              `**Action Required:** ${action}`,
              `**Priority:** ${priority}`,
              `**Context:** ${ctx}`,
              `**Deadline:** ${deadline}`,
              ``,
            ].join('\n');

            switch (event) {
              case 'implementation-approved': {
                if (!targetRepo) {
                  console.log('тЪая╕П No source_repo in payload тАФ cannot route');
                  break;
                }
                const issueNumber = payload.issue_number;
                const title = payload.title || 'Approved implementation';
                const implTitle = `[IMPLEMENT] ${title.replace(/\[(DECISION|OPPORTUNITY)\]\s*/gi, '').trim()}`;

                // Dedup: check for existing open IMPLEMENT issue
                const { data: existingImpls } = await github.rest.issues.listForRepo({
                  owner, repo: targetRepo, state: 'open',
                  labels: 'engineering,agent/dispatcher', per_page: 100,
                });
                if (existingImpls.some(i => i.title === implTitle)) {
                  console.log(`тПня╕П Skipping тАФ already exists: ${implTitle}`);
                  break;
                }

                const implBody = [
                  `## ЁЯФз Implementation Task`,
                  ``,
                  `**Decision:** #${issueNumber}`,
                  `**Dispatched by:** ЁЯза HQ Dispatcher`,
                  `**Hop:** ${hopCount}`,
                  ``,
                  `### Approved Direction`,
                  `> ${payload.recommendation || 'See decision issue for details'}`,
                  ``,
                  `### Instructions`,
                  `1. Read the full decision in #${issueNumber}`,
                  `2. Review strategy docs in \`strategy/\``,
                  `3. Follow the Agent Handbook (\`docs/agents/HANDBOOK.md\`)`,
                  `4. Implement the approved changes`,
                  `5. Create a PR linked to this issue`,
                  ``,
                  `### Acceptance Criteria`,
                  `- [ ] Implementation matches the approved decision`,
                  `- [ ] All existing tests pass`,
                  `- [ ] New functionality has tests`,
                  `- [ ] Documentation updated`,
                  `- [ ] PR description explains changes`,
                ].join('\n');

                const { data: impl } = await github.rest.issues.create({
                  owner, repo: targetRepo,
                  title: implTitle,
                  body: implBody,
                  labels: ['engineering', 'agent/dispatcher', 'copilot'],
                });

                // Assign to Copilot coding agent
                let assigned = false;
                for (const login of ['copilot', 'copilot[bot]']) {
                  try {
                    await github.rest.issues.addAssignees({
                      owner, repo: targetRepo,
                      issue_number: impl.number,
                      assignees: [login],
                    });
                    const { data: check } = await github.rest.issues.get({
                      owner, repo: targetRepo, issue_number: impl.number,
                    });
                    if (check.assignees.some(a => a.login.toLowerCase().includes('copilot'))) {
                      assigned = true;
                      break;
                    }
                  } catch {}
                }

                console.log(`тЬЕ Created ${targetRepo}#${impl.number}${assigned ? ' тЖТ @copilot' : ' (manual assignment needed)'}`);

                if (!assigned) {
                  await github.rest.issues.createComment({
                    owner, repo: targetRepo,
                    issue_number: impl.number,
                    body: `тЪая╕П Auto-assignment to Copilot failed. Please assign manually in the GitHub UI.`,
                  });
                }

                // Comment on decision issue
                if (issueNumber) {
                  const handoff = formatHandoff(
                    'ЁЯза HQ Dispatcher', 'ЁЯТ╗ Engineering (@copilot)',
                    'implement', 'high',
                    `Implementation dispatched as #${impl.number}`,
                    '48h'
                  );
                  await github.rest.issues.createComment({
                    owner, repo: targetRepo,
                    issue_number: issueNumber,
                    body: handoff,
                  });
                }
                break;
              }

              case 'incident-detected': {
                if (!targetRepo) break;
                const pattern = payload.pattern || 'Unknown error';
                const severity = payload.severity || 'medium';

                const oneHourAgo = new Date(Date.now() - 3600000).toISOString();
                const { data: recent } = await github.rest.issues.listForRepo({
                  owner, repo: targetRepo, state: 'all', labels: 'incident',
                  since: oneHourAgo, per_page: 10,
                });
                if (recent.length >= 3) {
                  console.log('ЁЯЫС CIRCUIT BREAKER: тЙе3 incidents in last hour');
                  break;
                }

                const { data: incident } = await github.rest.issues.create({
                  owner, repo: targetRepo,
                  title: `ЁЯЪи [INCIDENT] ${pattern.slice(0, 80)}`,
                  body: [
                    `## Production Incident`,
                    `**Severity:** ${severity}`,
                    `**Pattern:** \`${pattern}\``,
                    `**Detected by:** HQ Dispatcher`,
                    ``,
                    `@copilot please investigate this error.`,
                  ].join('\n'),
                  labels: ['bug', 'incident', 'agent/dispatcher'],
                });

                try {
                  await github.rest.issues.addAssignees({
                    owner, repo: targetRepo,
                    issue_number: incident.number,
                    assignees: ['copilot'],
                  });
                } catch {}
                console.log(`ЁЯЪи Incident ${targetRepo}#${incident.number} created`);
                break;
              }

              case 'meeting-requested': {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo: context.repo.repo,
                  workflow_id: 'agent-meetings.yml',
                  ref: 'main',
                  inputs: { meeting_type: payload.type || 'standup' },
                });
                console.log('тЬЕ Meeting workflow triggered');
                break;
              }

              case 'market-analysis-requested': {
                const analysisType = payload.analysis_type || 'all';
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo: context.repo.repo,
                  workflow_id: 'market-analysis.yml',
                  ref: 'main',
                  inputs: { analysis_type: analysisType },
                });
                console.log(`ЁЯУК Market analysis workflow triggered (type: ${analysisType})`);
                break;
              }

              case 'work-completed': {
                console.log(`тЬЕ Work completed: ${payload.summary || 'no summary'}`);
                break;
              }

              default:
                console.log(`тЪая╕П Unknown event type: ${event}`);
            }
